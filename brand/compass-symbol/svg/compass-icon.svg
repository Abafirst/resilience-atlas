<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="compass-title compass-desc">
  <title id="compass-title">Resilience Atlas Compass</title>
  <desc id="compass-desc">A six-point compass star representing the six resilience dimensions of The Resilience Atlas: Cognitive-Narrative, Agentic-Generative, Spiritual-Existential, Somatic-Behavioral, Emotional-Adaptive, and Relational.</desc>

  <defs>
    <!-- Drop shadow for arrows -->
    <filter id="arrow-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="rgba(0,0,0,0.22)" flood-opacity="1"/>
    </filter>

    <!-- Radial gradient for central dot (depth/reflection) -->
    <radialGradient id="center-dot-gradient" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#5B9BD5"/>
      <stop offset="60%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D3E7A"/>
    </radialGradient>

    <!-- Subtle background fill gradient -->
    <radialGradient id="bg-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F0F4F9"/>
    </radialGradient>
  </defs>

  <!-- ── Layer 1: Background ── -->
  <circle cx="100" cy="100" r="96" fill="url(#bg-gradient)"/>

  <!-- ── Layer 2: Outer circle (Atlas map boundary) ── -->
  <circle id="compass-boundary" cx="100" cy="100" r="88" fill="none" stroke="#1565C0" stroke-width="2"/>

  <!-- ── Layer 3: Degree markers (12 marks, compass precision) ── -->
  <g opacity="0.2" stroke="#1565C0" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="12"   x2="100" y2="16"/>
    <line x1="144" y1="23.8" x2="142" y2="27.3"/>
    <line x1="176.2" y1="56" x2="172.8" y2="58"/>
    <line x1="188" y1="100" x2="184" y2="100"/>
    <line x1="176.2" y1="144" x2="172.8" y2="142"/>
    <line x1="144" y1="176.2" x2="142" y2="172.8"/>
    <line x1="100" y1="188" x2="100" y2="184"/>
    <line x1="56" y1="176.2" x2="58" y2="172.8"/>
    <line x1="23.8" y1="144" x2="27.3" y2="142"/>
    <line x1="12" y1="100"  x2="16" y2="100"/>
    <line x1="23.8" y1="56" x2="27.3" y2="58"/>
    <line x1="56" y1="23.8" x2="58" y2="27.3"/>
  </g>

  <!-- ── Layer 4: Radial connecting lines (center → hexagon vertices) ── -->
  <g opacity="0.3" stroke="#757575" stroke-width="0.75" stroke-dasharray="2,3">
    <line x1="100" y1="100" x2="100"  y2="60"/>
    <line x1="100" y1="100" x2="134.6" y2="80"/>
    <line x1="100" y1="100" x2="134.6" y2="120"/>
    <line x1="100" y1="100" x2="100"  y2="140"/>
    <line x1="100" y1="100" x2="65.4" y2="120"/>
    <line x1="100" y1="100" x2="65.4" y2="80"/>
  </g>

  <!-- ── Layer 5: Inner hexagon (structural interconnection) ── -->
  <polygon
    points="100,60 134.6,80 134.6,120 100,140 65.4,120 65.4,80"
    fill="none"
    stroke="#BDBDBD"
    stroke-width="1"
    opacity="0.55"/>

  <!-- ── Layer 6: Six compass arrows ── -->
  <!-- Arrow path (pointing up, before transform):
       M 0,-78  — tip
       L 7,-64  — right wing tip
       L 3,-64  — right wing inner
       L 3,-35  — right shaft base
       L -3,-35 — left shaft base
       L -3,-64 — left wing inner
       L -7,-64 — left wing tip
       Z
  -->

  <!-- North (0°): Cognitive-Narrative — Navigation Blue -->
  <path
    d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(0)"
    fill="#1565C0"
    filter="url(#arrow-shadow)"
    data-dimension="Cognitive-Narrative"
    data-domain="Navigation"/>

  <!-- Northeast (60°): Agentic-Generative — Navigation Blue -->
  <path
    d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(60)"
    fill="#1565C0"
    filter="url(#arrow-shadow)"
    data-dimension="Agentic-Generative"
    data-domain="Navigation"/>

  <!-- Southeast (120°): Spiritual-Existential — Anchoring Purple -->
  <path
    d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(120)"
    fill="#6A4C93"
    filter="url(#arrow-shadow)"
    data-dimension="Spiritual-Existential"
    data-domain="Anchoring"/>

  <!-- South (180°): Somatic-Behavioral — Anchoring Purple -->
  <path
    d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(180)"
    fill="#6A4C93"
    filter="url(#arrow-shadow)"
    data-dimension="Somatic-Behavioral"
    data-domain="Anchoring"/>

  <!-- Southwest (240°): Emotional-Adaptive — Connection Teal -->
  <path
    d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(240)"
    fill="#0097A7"
    filter="url(#arrow-shadow)"
    data-dimension="Emotional-Adaptive"
    data-domain="Connection"/>

  <!-- Northwest (300°): Relational — Connection Teal -->
  <path
    d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(300)"
    fill="#0097A7"
    filter="url(#arrow-shadow)"
    data-dimension="Relational"
    data-domain="Connection"/>

  <!-- ── Layer 7: Central dot (The Individual) ── -->
  <circle id="compass-center" cx="100" cy="100" r="8" fill="url(#center-dot-gradient)"/>
  <!-- Subtle highlight on central dot -->
  <circle cx="97.5" cy="97.5" r="2.5" fill="white" opacity="0.35"/>
</svg>
