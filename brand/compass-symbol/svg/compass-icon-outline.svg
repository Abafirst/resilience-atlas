<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="compass-outline-title compass-outline-desc">
  <title id="compass-outline-title">Resilience Atlas Compass — Outline</title>
  <desc id="compass-outline-desc">Outline-only version of the Resilience Atlas compass. Stroked arrows with no fill, suitable for use on colored or photographic backgrounds and for laser engraving or embossing.</desc>

  <!-- Outer circle boundary -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#1565C0" stroke-width="2"/>

  <!-- Degree markers -->
  <g opacity="0.3" stroke="#1565C0" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="12"   x2="100" y2="16"/>
    <line x1="144" y1="23.8" x2="142" y2="27.3"/>
    <line x1="176.2" y1="56" x2="172.8" y2="58"/>
    <line x1="188" y1="100" x2="184" y2="100"/>
    <line x1="176.2" y1="144" x2="172.8" y2="142"/>
    <line x1="144" y1="176.2" x2="142" y2="172.8"/>
    <line x1="100" y1="188" x2="100" y2="184"/>
    <line x1="56" y1="176.2" x2="58" y2="172.8"/>
    <line x1="23.8" y1="144" x2="27.3" y2="142"/>
    <line x1="12" y1="100"  x2="16" y2="100"/>
    <line x1="23.8" y1="56" x2="27.3" y2="58"/>
    <line x1="56" y1="23.8" x2="58" y2="27.3"/>
  </g>

  <!-- Radial connecting lines -->
  <g opacity="0.25" stroke="#1565C0" stroke-width="0.75" stroke-dasharray="2,3">
    <line x1="100" y1="100" x2="100"  y2="60"/>
    <line x1="100" y1="100" x2="134.6" y2="80"/>
    <line x1="100" y1="100" x2="134.6" y2="120"/>
    <line x1="100" y1="100" x2="100"  y2="140"/>
    <line x1="100" y1="100" x2="65.4" y2="120"/>
    <line x1="100" y1="100" x2="65.4" y2="80"/>
  </g>

  <!-- Inner hexagon -->
  <polygon
    points="100,60 134.6,80 134.6,120 100,140 65.4,120 65.4,80"
    fill="none" stroke="#1565C0" stroke-width="1" opacity="0.4"/>

  <!-- All six outline arrows (stroke only, no fill) -->
  <path d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(0)"   fill="none" stroke="#1565C0" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(60)"  fill="none" stroke="#1565C0" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(120)" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(180)" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(240)" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 0,-78 L 7,-64 L 3,-64 L 3,-35 L -3,-35 L -3,-64 L -7,-64 Z"
    transform="translate(100,100) rotate(300)" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Central dot (outline only) -->
  <circle cx="100" cy="100" r="8" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="2" fill="#1565C0"/>
</svg>
