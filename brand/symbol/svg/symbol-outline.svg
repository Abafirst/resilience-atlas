<!--
  Resilience Atlas — Brand Symbol (Outline / White)
  =================================================
  All elements in white — for use on dark/colored backgrounds,
  overlays, and watermark contexts.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img"
     aria-label="Resilience Atlas">
  <title>Resilience Atlas</title>

  <!-- Inner hexagon -->
  <polygon
    points="145,100 122.5,138.97 77.5,138.97 55,100 77.5,61.03 122.5,61.03"
    fill="none"
    stroke="white"
    stroke-width="0.75"
    opacity="0.2"
  />

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="58"
    fill="none"
    stroke="white"
    stroke-width="1"
    opacity="0.25"
  />

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="91"
    fill="none"
    stroke="white"
    stroke-width="1.75"
    opacity="0.85"
  />

  <!-- Cardinal markers -->
  <line x1="100" y1="9"   x2="100" y2="26"  stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="100" y1="174" x2="100" y2="191" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="174" y1="100" x2="191" y2="100" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="9"   y1="100" x2="26"  y2="100" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Ordinal dots -->
  <circle cx="164.3" cy="35.7"  r="2.2" fill="white" opacity="0.5"/>
  <circle cx="164.3" cy="164.3" r="2.2" fill="white" opacity="0.5"/>
  <circle cx="35.7"  cy="164.3" r="2.2" fill="white" opacity="0.5"/>
  <circle cx="35.7"  cy="35.7"  r="2.2" fill="white" opacity="0.5"/>

  <!-- Central dot -->
  <circle cx="100" cy="100" r="8" fill="white"/>
  <!-- Highlight -->
  <circle cx="97.2" cy="97.2" r="2.8" fill="white" opacity="0.4"/>
</svg>
