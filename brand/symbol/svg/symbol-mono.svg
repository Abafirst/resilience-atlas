<!--
  Resilience Atlas — Brand Symbol (Monochrome Dark)
  =================================================
  All elements rendered in #212121 (near-black).
  Use on light backgrounds or where color printing is unavailable.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img"
     aria-label="Resilience Atlas">
  <title>Resilience Atlas</title>

  <!-- Inner hexagon -->
  <polygon
    points="145,100 122.5,138.97 77.5,138.97 55,100 77.5,61.03 122.5,61.03"
    fill="none"
    stroke="#212121"
    stroke-width="0.75"
    opacity="0.15"
  />

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="58"
    fill="none"
    stroke="#212121"
    stroke-width="1"
    opacity="0.18"
  />

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="91"
    fill="none"
    stroke="#212121"
    stroke-width="1.75"
    opacity="0.75"
  />

  <!-- Cardinal markers -->
  <line x1="100" y1="9"   x2="100" y2="26"  stroke="#212121" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="174" x2="100" y2="191" stroke="#212121" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="174" y1="100" x2="191" y2="100" stroke="#212121" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="9"   y1="100" x2="26"  y2="100" stroke="#212121" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Ordinal dots -->
  <circle cx="164.3" cy="35.7"  r="2.2" fill="#757575" opacity="0.55"/>
  <circle cx="164.3" cy="164.3" r="2.2" fill="#757575" opacity="0.55"/>
  <circle cx="35.7"  cy="164.3" r="2.2" fill="#757575" opacity="0.55"/>
  <circle cx="35.7"  cy="35.7"  r="2.2" fill="#757575" opacity="0.55"/>

  <!-- Central dot -->
  <circle cx="100" cy="100" r="8" fill="#212121"/>
</svg>
