<!--
  Resilience Atlas — Brand Symbol (Full Color — explicit copy)
  ============================================================
  Identical to symbol.svg. Provided as an explicit "color" variant
  so tooling that expects a separate *-color.svg file works without
  symlinks.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img"
     aria-label="Resilience Atlas">
  <title>Resilience Atlas</title>

  <defs>
    <radialGradient id="ra-center-grad" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#5C8FD6"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
    <clipPath id="ra-clip">
      <circle cx="100" cy="100" r="91"/>
    </clipPath>
  </defs>

  <!-- Inner hexagon -->
  <polygon
    points="145,100 122.5,138.97 77.5,138.97 55,100 77.5,61.03 122.5,61.03"
    fill="none"
    stroke="#0097A7"
    stroke-width="0.75"
    opacity="0.18"
    clip-path="url(#ra-clip)"
  />

  <!-- Inner ring (teal) -->
  <circle cx="100" cy="100" r="58"
    fill="none"
    stroke="#0097A7"
    stroke-width="1"
    opacity="0.22"
  />

  <!-- Outer circle (navy) -->
  <circle cx="100" cy="100" r="91"
    fill="none"
    stroke="#1565C0"
    stroke-width="1.75"
    opacity="0.75"
  />

  <!-- Cardinal markers -->
  <line x1="100" y1="9"   x2="100" y2="26"  stroke="#1565C0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="174" x2="100" y2="191" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="174" y1="100" x2="191" y2="100" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="9"   y1="100" x2="26"  y2="100" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Ordinal dots -->
  <circle cx="164.3" cy="35.7"  r="2.2" fill="#E0E0E0" opacity="0.55"/>
  <circle cx="164.3" cy="164.3" r="2.2" fill="#E0E0E0" opacity="0.55"/>
  <circle cx="35.7"  cy="164.3" r="2.2" fill="#E0E0E0" opacity="0.55"/>
  <circle cx="35.7"  cy="35.7"  r="2.2" fill="#E0E0E0" opacity="0.55"/>

  <!-- Central focal point -->
  <circle cx="100" cy="100" r="8" fill="url(#ra-center-grad)"/>
  <circle cx="97.2" cy="97.2" r="2.8" fill="white" opacity="0.3"/>
</svg>
