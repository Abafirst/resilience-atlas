<!--
  Resilience Atlas — Favicon SVG
  ================================
  Optimized for tiny render sizes (16 × 16 → 64 × 64).
  Strokes are intentionally heavier so they remain crisp
  when the browser scales this down to 16 px.
  viewBox: 0 0 200 200 (scalable, no hard-coded px size)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img"
     aria-label="Resilience Atlas">
  <title>Resilience Atlas</title>

  <defs>
    <radialGradient id="fav-center" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#5C8FD6"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
    <linearGradient id="fav-needle" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#5C8FD6"/>
    </linearGradient>
  </defs>

  <!-- Outer circle (heavier stroke for small sizes) -->
  <circle cx="100" cy="100" r="88"
    fill="none"
    stroke="#1565C0"
    stroke-width="8"
  />

  <!-- Hexagon (simplified for small sizes — 6-dimension indicator) -->
  <polygon
    points="100,30 160.6,65 160.6,135 100,170 39.4,135 39.4,65"
    fill="none"
    stroke="#0097A7"
    stroke-width="5"
    opacity="0.6"
  />

  <!-- Compass needle pointing north (thick for favicon legibility) -->
  <!-- North needle — blue gradient, pointing up -->
  <polygon points="100,44 107,96 100,88 93,96" fill="url(#fav-needle)"/>
  <!-- South needle — grey, counter-direction -->
  <polygon points="100,156 107,104 100,112 93,104" fill="#90A4AE" opacity="0.5"/>

  <!-- Central dot (large for favicon) -->
  <circle cx="100" cy="100" r="20" fill="url(#fav-center)"/>
</svg>
