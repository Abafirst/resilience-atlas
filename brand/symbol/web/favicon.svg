<!--
  Resilience Atlas — Favicon SVG
  ================================
  Optimized for tiny render sizes (16 × 16 → 64 × 64).
  Strokes are intentionally heavier so they remain crisp
  when the browser scales this down to 16 px.
  viewBox: 0 0 200 200 (scalable, no hard-coded px size)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img"
     aria-label="Resilience Atlas">
  <title>Resilience Atlas</title>

  <defs>
    <radialGradient id="fav-center" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#5C8FD6"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
  </defs>

  <!-- Outer circle (heavier stroke for small sizes) -->
  <circle cx="100" cy="100" r="88"
    fill="none"
    stroke="#1565C0"
    stroke-width="8"
  />

  <!-- Cardinal markers (thick, rounded — legible at 16 px) -->
  <!-- North -->
  <line x1="100" y1="12"  x2="100" y2="36"  stroke="#1565C0" stroke-width="8" stroke-linecap="round"/>
  <!-- South -->
  <line x1="100" y1="164" x2="100" y2="188" stroke="#1565C0" stroke-width="8" stroke-linecap="round"/>
  <!-- East -->
  <line x1="164" y1="100" x2="188" y2="100" stroke="#1565C0" stroke-width="8" stroke-linecap="round"/>
  <!-- West -->
  <line x1="12"  y1="100" x2="36"  y2="100" stroke="#1565C0" stroke-width="8" stroke-linecap="round"/>

  <!-- Central dot -->
  <circle cx="100" cy="100" r="22" fill="url(#fav-center)"/>
</svg>
