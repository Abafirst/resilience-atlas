<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resilience Atlas</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; background: #f5f7fa; color: #333; }
    </style>
    <!-- Global legacy app styles (site-header, nav, quiz, etc.) -->
    <link rel="stylesheet" href="/styles.css" />
    <!-- Upsell & payment-gating branded CSS (used by ResultsPage upgrade cards, modals, and overlays) -->
    <link rel="stylesheet" href="/css/payment-ui.css" />
    <link rel="stylesheet" href="/css/upsell.css" />
  </head>
  <body>
    <div id="root"></div>
    <!-- payment-gating.js must load before the React module so window.PaymentGating
         is available when the SPA mounts and the DOMContentLoaded handler can run
         handleUpgradeSuccess() before React's first render. -->
    <script src="/js/payment-gating.js"></script>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://js.stripe.com/v3/"></script>
  </body>
</html>
