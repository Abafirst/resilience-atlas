<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Certificate body -->
  <rect x="8" y="10" width="48" height="38" rx="4" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2.5"/>
  <!-- Horizontal lines (text lines) -->
  <line x1="18" y1="24" x2="46" y2="24" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="31" x2="46" y2="31" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="37" x2="38" y2="37" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ribbon/seal circle -->
  <circle cx="32" cy="54" r="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <!-- Star in seal -->
  <polygon points="32,48.5 33.5,52.5 37.5,52.5 34.5,55 35.5,59 32,56.8 28.5,59 29.5,55 26.5,52.5 30.5,52.5" fill="#4F46E5"/>
  <!-- Ribbon tails -->
  <line x1="26" y1="60" x2="23" y2="64" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="60" x2="41" y2="64" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"/>
</svg>
