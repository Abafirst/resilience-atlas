<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Enterprise / building icon -->
  <circle cx="32" cy="32" r="27" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2.5"/>
  <!-- Building base -->
  <rect x="18" y="28" width="28" height="20" rx="1.5" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <!-- Roof / gable -->
  <polyline points="14,30 32,16 50,30" fill="none" stroke="#D97706" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Door -->
  <rect x="27" y="38" width="10" height="10" rx="5" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <!-- Left window -->
  <rect x="21" y="32" width="7" height="5" rx="1" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <!-- Right window -->
  <rect x="36" y="32" width="7" height="5" rx="1" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
</svg>
