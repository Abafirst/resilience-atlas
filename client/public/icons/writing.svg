<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Soft slate background -->
  <circle cx="32" cy="32" r="30" fill="#F8FAFC"/>
  <!-- Pencil body -->
  <rect x="26" y="12" width="12" height="36" rx="2" fill="#64748B" transform="rotate(-30 32 32)"/>
  <!-- Pencil tip -->
  <polygon points="20,48 24,52 28,44" fill="#F59E0B"/>
  <!-- Pencil eraser (top) -->
  <rect x="31" y="10" width="10" height="6" rx="2" fill="#FDA4AF" transform="rotate(-30 32 32)"/>
  <!-- Writing lines on page behind -->
  <line x1="38" y1="26" x2="50" y2="24" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="52" y2="30" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="38" x2="54" y2="36" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
</svg>
