<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="#FEF8EC"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#F4B942" stroke-width="2"/>
  <!-- Inner glowing circle -->
  <circle cx="32" cy="32" r="8" fill="#F4B942"/>
  <!-- 8 radiating rays (reflective like a sun/lotus) -->
  <line x1="32" y1="6"  x2="32" y2="18" stroke="#F4B942" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="58" stroke="#F4B942" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="18" y2="32" stroke="#F4B942" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="58" y2="32" stroke="#F4B942" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14.1" y1="14.1" x2="22.5" y2="22.5" stroke="#F4B942" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="41.5" y1="41.5" x2="49.9" y2="49.9" stroke="#F4B942" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49.9" y1="14.1" x2="41.5" y2="22.5" stroke="#F4B942" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22.5" y1="41.5" x2="14.1" y2="49.9" stroke="#F4B942" stroke-width="2.5" stroke-linecap="round"/>
</svg>
