<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Soft green background -->
  <circle cx="32" cy="32" r="30" fill="#F0FDF4"/>
  <!-- Stem -->
  <line x1="32" y1="52" x2="32" y2="28" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M32 36 Q22 30 20 20 Q28 22 32 32" fill="#22C55E" opacity="0.85"/>
  <!-- Right leaf -->
  <path d="M32 30 Q42 24 44 14 Q36 16 32 26" fill="#16A34A" opacity="0.85"/>
  <!-- Upward arrow indicating growth -->
  <polyline points="28,16 32,10 36,16" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Root dots -->
  <circle cx="26" cy="53" r="2" fill="#16A34A" opacity="0.4"/>
  <circle cx="38" cy="54" r="1.5" fill="#16A34A" opacity="0.35"/>
</svg>
