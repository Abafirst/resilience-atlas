<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Soft pink background -->
  <circle cx="32" cy="32" r="30" fill="#FFF1F2"/>
  <!-- Two figures holding hands -->
  <!-- Left person head -->
  <circle cx="20" cy="20" r="5" fill="#E11D48"/>
  <!-- Left body -->
  <line x1="20" y1="25" x2="20" y2="40" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left legs -->
  <line x1="20" y1="40" x2="16" y2="50" stroke="#E11D48" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="40" x2="24" y2="50" stroke="#E11D48" stroke-width="2" stroke-linecap="round"/>
  <!-- Right person head -->
  <circle cx="44" cy="20" r="5" fill="#E11D48"/>
  <!-- Right body -->
  <line x1="44" y1="25" x2="44" y2="40" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right legs -->
  <line x1="44" y1="40" x2="40" y2="50" stroke="#E11D48" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="40" x2="48" y2="50" stroke="#E11D48" stroke-width="2" stroke-linecap="round"/>
  <!-- Joined hands / connection line -->
  <line x1="24" y1="32" x2="40" y2="32" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Heart above connection -->
  <path d="M29 24 Q29 20 32 22 Q35 20 35 24 Q35 28 32 30 Q29 28 29 24 Z" fill="#E11D48" opacity="0.6"/>
</svg>
