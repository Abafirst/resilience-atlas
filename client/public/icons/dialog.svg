<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Soft sky background -->
  <circle cx="32" cy="32" r="30" fill="#F0F9FF"/>
  <!-- Microphone body -->
  <rect x="24" y="10" width="16" height="26" rx="8" fill="#0EA5E9" stroke="#0369A1" stroke-width="1.5"/>
  <!-- Mic grille lines -->
  <line x1="24" y1="20" x2="40" y2="20" stroke="#0369A1" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="25" x2="40" y2="25" stroke="#0369A1" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="30" x2="40" y2="30" stroke="#0369A1" stroke-width="1" opacity="0.4"/>
  <!-- Stand arc -->
  <path d="M18 36 Q18 50 32 50 Q46 50 46 36" stroke="#0369A1" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Stand base -->
  <line x1="32" y1="50" x2="32" y2="56" stroke="#0369A1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="56" x2="40" y2="56" stroke="#0369A1" stroke-width="2.5" stroke-linecap="round"/>
</svg>
