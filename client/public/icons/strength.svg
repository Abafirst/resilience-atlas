<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Soft orange background -->
  <circle cx="32" cy="32" r="30" fill="#FFF7ED"/>
  <!-- Dumbbell bar -->
  <rect x="20" y="30" width="24" height="4" rx="2" fill="#EA580C"/>
  <!-- Left weight plate -->
  <rect x="12" y="24" width="8" height="16" rx="3" fill="#F97316" stroke="#EA580C" stroke-width="1.5"/>
  <!-- Right weight plate -->
  <rect x="44" y="24" width="8" height="16" rx="3" fill="#F97316" stroke="#EA580C" stroke-width="1.5"/>
  <!-- Center knurl lines -->
  <line x1="30" y1="30" x2="30" y2="34" stroke="#EA580C" stroke-width="1" stroke-linecap="round"/>
  <line x1="34" y1="30" x2="34" y2="34" stroke="#EA580C" stroke-width="1" stroke-linecap="round"/>
</svg>
