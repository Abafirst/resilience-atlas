<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Outer compass ring -->
  <circle cx="32" cy="32" r="27" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Inner tick ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="2 4"/>
  <!-- North needle (blue, pointing up) -->
  <polygon points="32,10 28.5,32 32,30 35.5,32" fill="#3B82F6"/>
  <!-- South needle (slate, pointing down) -->
  <polygon points="32,54 28.5,32 32,34 35.5,32" fill="#CBD5E1"/>
  <!-- West/East subtle lines -->
  <line x1="8"  y1="32" x2="16" y2="32" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="56" y2="32" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#3B82F6"/>
</svg>
