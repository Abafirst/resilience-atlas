<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Soft purple background -->
  <circle cx="32" cy="32" r="30" fill="#EDE9FE"/>
  <!-- Controller body -->
  <rect x="10" y="21" width="44" height="26" rx="8" fill="#DDD6FE" stroke="#7C3AED" stroke-width="2"/>
  <!-- D-pad horizontal -->
  <rect x="15" y="30" width="14" height="5" rx="2" fill="#7C3AED"/>
  <!-- D-pad vertical -->
  <rect x="20" y="25" width="4" height="14" rx="2" fill="#7C3AED"/>
  <!-- Face button A (right) -->
  <circle cx="47" cy="32" r="3.5" fill="#7C3AED"/>
  <!-- Face button B (bottom) -->
  <circle cx="41" cy="38" r="3.5" fill="#A78BFA"/>
  <!-- Face button X (top) -->
  <circle cx="41" cy="26" r="3.5" fill="#A78BFA"/>
  <!-- Face button Y (left) -->
  <circle cx="35" cy="32" r="3.5" fill="#A78BFA"/>
</svg>