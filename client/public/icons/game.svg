<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Soft indigo background -->
  <circle cx="32" cy="32" r="30" fill="#EEF2FF"/>
  <!-- Gamepad body -->
  <rect x="12" y="22" width="40" height="22" rx="11" fill="#C7D2FE" stroke="#4F46E5" stroke-width="2"/>
  <!-- D-pad left -->
  <rect x="18" y="30" width="10" height="4" rx="2" fill="#4F46E5"/>
  <!-- D-pad up/down cross -->
  <rect x="21" y="27" width="4" height="10" rx="2" fill="#4F46E5"/>
  <!-- Right buttons -->
  <circle cx="42" cy="29" r="2.5" fill="#4F46E5"/>
  <circle cx="47" cy="33" r="2.5" fill="#4F46E5"/>
  <circle cx="42" cy="37" r="2.5" fill="#4F46E5"/>
  <circle cx="37" cy="33" r="2.5" fill="#4F46E5"/>
  <!-- Center lines -->
  <line x1="28" y1="33" x2="34" y2="33" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
</svg>