<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Soft teal background -->
  <circle cx="32" cy="32" r="30" fill="#F0FDFA"/>
  <!-- Running figure - body -->
  <circle cx="36" cy="16" r="5" fill="#0D9488" stroke="#0D9488" stroke-width="1"/>
  <!-- Torso -->
  <line x1="36" y1="21" x2="32" y2="34" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm (swinging back) -->
  <line x1="34" y1="24" x2="26" y2="30" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm (forward) -->
  <line x1="34" y1="24" x2="42" y2="28" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left leg (back) -->
  <line x1="32" y1="34" x2="24" y2="44" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="44" x2="20" y2="50" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
  <!-- Right leg (forward) -->
  <line x1="32" y1="34" x2="40" y2="42" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="42" x2="46" y2="48" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
  <!-- Motion lines -->
  <line x1="14" y1="36" x2="22" y2="36" stroke="#0D9488" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="12" y1="40" x2="19" y2="40" stroke="#0D9488" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
