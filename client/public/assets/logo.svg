<!--
  Resilience Atlas — Brand Symbol (Master / Full Color)
  =====================================================
  viewBox  : 0 0 256 256
  Design   : Compass/radar mark — 6 resilience dimensions
             Concentric rings · 6 pastel data points · Center focal point
             Dimensions: Agentic, Relational, Spiritual, Emotional, Somatic, Cognitive
  Colors   :
    Agentic   (top, 12 o'clock)  #FFB89D  Pastel orange/peach  — action, drive, energy
    Relational (2 o'clock)       #FFB3D9  Pastel pink/rose     — connection, love, relationships
    Spiritual  (4 o'clock)       #FFE699  Pastel gold/yellow   — enlightenment, purpose, meaning
    Emotional  (bottom, 6 o'cl.) #D4BBFF  Pastel purple/lav.  — depth, introspection, feelings
    Somatic    (8 o'clock)       #B3E5C5  Pastel green/mint   — body, health, vitality
    Cognitive  (10 o'clock)      #A8D8FF  Pastel blue/sky     — thought, intellect, mind
  Usage    : Primary branding, large displays, print, web favicon
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256"
     role="img" aria-label="Resilience Atlas">
  <title>Resilience Atlas</title>

  <defs>
    <!-- Radial gradient for the central focal sphere -->
    <radialGradient id="ra-center-grad" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#6BA8F5"/>
      <stop offset="100%" stop-color="#2E5C8A"/>
    </radialGradient>

    <!-- Top needle gradient: lighter blue at tip (top), darker blue at base (center) -->
    <linearGradient id="needleTopGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4A6FA5"/>
      <stop offset="100%" stop-color="#2E5C8A"/>
    </linearGradient>

    <!-- Bottom needle gradient: slightly darker gray at base (center), lighter gray at tip (bottom) -->
    <linearGradient id="needleBottomGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#B0B8C0"/>
      <stop offset="100%" stop-color="#D8DCE0"/>
    </linearGradient>

    <!-- Clip path keeps all content inside the outer circle -->
    <clipPath id="ra-clip">
      <circle cx="128" cy="128" r="118"/>
    </clipPath>
  </defs>

  <!-- ── 1. Outer circular boundary ───────────────────────────────── -->
  <circle cx="128" cy="128" r="118"
    fill="none"
    stroke="#4A90E2"
    stroke-width="3"
    opacity="0.85"
  />

  <!-- ── 2. Concentric rings radiating from center ─────────────────── -->
  <!-- Innermost ring (r=28) -->
  <circle cx="128" cy="128" r="28"
    fill="none" stroke="#D3E4F4" stroke-width="1" opacity="0.7"/>
  <!-- Middle ring (r=52) -->
  <circle cx="128" cy="128" r="52"
    fill="none" stroke="#D3E4F4" stroke-width="1" opacity="0.6"/>
  <!-- Outer ring (r=76) — near the dimension dots -->
  <circle cx="128" cy="128" r="76"
    fill="none" stroke="#D3E4F4" stroke-width="1" opacity="0.5"/>

  <!-- ── 3. Radial lines (spokes) from center to outer boundary ─────── -->
  <!-- Agentic — 0° (North/top) -->
  <line x1="128" y1="128" x2="128"  y2="10"
    stroke="#E8E8E8" stroke-width="1" clip-path="url(#ra-clip)"/>
  <!-- Relational — 60° (NE) -->
  <line x1="128" y1="128" x2="230.2" y2="69"
    stroke="#E8E8E8" stroke-width="1" clip-path="url(#ra-clip)"/>
  <!-- Spiritual — 120° (SE) -->
  <line x1="128" y1="128" x2="230.2" y2="187"
    stroke="#E8E8E8" stroke-width="1" clip-path="url(#ra-clip)"/>
  <!-- Emotional — 180° (South/bottom) -->
  <line x1="128" y1="128" x2="128"  y2="246"
    stroke="#E8E8E8" stroke-width="1" clip-path="url(#ra-clip)"/>
  <!-- Somatic — 240° (SW) -->
  <line x1="128" y1="128" x2="25.8" y2="187"
    stroke="#E8E8E8" stroke-width="1" clip-path="url(#ra-clip)"/>
  <!-- Cognitive — 300° (NW) -->
  <line x1="128" y1="128" x2="25.8" y2="69"
    stroke="#E8E8E8" stroke-width="1" clip-path="url(#ra-clip)"/>

  <!-- ── 4. Double-pointed diamond needle (compass pointer) ────────────── -->
  <!-- Top diamond: tip at y=62 (clears Agentic dot bottom edge ~y=58),     -->
  <!--              widens at y=120, base meets center at y=128              -->
  <polygon points="128,62 135,120 128,128 121,120"
    fill="url(#needleTopGradient)"
    stroke="#2E5C8A"
    stroke-width="0.5"
    opacity="0.95"
  />
  <!-- Bottom diamond: base at y=128 (center), widens at y=136,             -->
  <!--                 tip at y=196 (clears Emotional dot top edge ~y=198)  -->
  <polygon points="128,128 135,136 128,196 121,136"
    fill="url(#needleBottomGradient)"
    stroke="#A0A8B0"
    stroke-width="0.5"
    opacity="0.95"
  />

  <!-- ── 5. Six dimension dots (hexagon arrangement, r=78 from center) ── -->
  <!-- Agentic  (top, 0°)    — Pastel orange/peach -->
  <circle cx="128"   cy="50"  r="8" fill="#FFB89D"/>
  <!-- Relational (2 o'clock, 60°) — Pastel pink/rose -->
  <circle cx="195.5" cy="89"  r="8" fill="#FFB3D9"/>
  <!-- Spiritual  (4 o'clock, 120°) — Pastel gold/yellow -->
  <circle cx="195.5" cy="167" r="8" fill="#FFE699"/>
  <!-- Emotional  (bottom, 180°) — Pastel purple/lavender -->
  <circle cx="128"   cy="206" r="8" fill="#D4BBFF"/>
  <!-- Somatic    (8 o'clock, 240°) — Pastel green/mint -->
  <circle cx="60.5"  cy="167" r="8" fill="#B3E5C5"/>
  <!-- Cognitive  (10 o'clock, 300°) — Pastel blue/sky -->
  <circle cx="60.5"  cy="89"  r="8" fill="#A8D8FF"/>

  <!-- ── 6. Central focal sphere — the individual ──────────────────── -->
  <circle cx="128" cy="128" r="20"
    fill="url(#ra-center-grad)"
  />
  <!-- Subtle specular highlight -->
  <circle cx="122" cy="122" r="5.5"
    fill="white"
    opacity="0.3"
  />
</svg>
