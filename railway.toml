# Railway Configuration

# This file is used to configure your Railway project.

# Backend configuration
[build]
  command = "npm install"
  output = "/"

# Specify where to run your backend from
[backend]
  dockerfile = "./Dockerfile"
  startCommand = "npm run start"

# Deployment settings
[deployment]
  branch = "main"
  autoDeploy = true
  environment = "production"