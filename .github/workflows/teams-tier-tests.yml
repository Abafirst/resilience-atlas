name: Teams Tier Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          npm install

      - name: Run Teams tier verification tests
        run: |
          mkdir -p test-results
          jest --outputFile=test-results/teams-tier-results.json

      - name: Upload test results
        uses: actions/upload-artifact@v2
        with:
          name: teams-tier-results
          path: test-results/teams-tier-results.json