<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Background -->
  <circle cx="32" cy="32" r="28" fill="#EFF6FF"/>
  <!-- Left person -->
  <circle cx="18" cy="22" r="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <!-- Right person -->
  <circle cx="46" cy="22" r="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <!-- Two hands meeting in the middle / connection arc -->
  <path d="M18 30 C18 42 46 42 46 30" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Connection dot in the middle -->
  <circle cx="32" cy="42" r="4" fill="#3B82F6"/>
</svg>
