<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="28" fill="#EFF6FF"/>
  <!-- Pen/writing instrument -->
  <rect x="28" y="8" width="8" height="36" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" transform="rotate(30, 32, 26)"/>
  <!-- Pen tip -->
  <polygon points="28,44 36,44 32,54" fill="#3B82F6" transform="rotate(30, 32, 49)"/>
  <!-- Writing lines on the right -->
  <line x1="34" y1="40" x2="52" y2="40" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="47" x2="52" y2="47" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="54" x2="52" y2="54" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
</svg>
