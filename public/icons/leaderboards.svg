<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64" aria-hidden="true">
  <!-- Podium base -->
  <rect x="10" y="50" width="44" height="6" rx="2" fill="#22C55E" opacity="0.3"/>
  <!-- 2nd place bar -->
  <rect x="13" y="32" width="14" height="18" rx="3" fill="#BBF7D0" stroke="#22C55E" stroke-width="2"/>
  <text x="20" y="44" text-anchor="middle" font-size="9" font-weight="700" fill="#15803D" font-family="sans-serif">2</text>
  <!-- 1st place bar (tallest) -->
  <rect x="25" y="20" width="14" height="30" rx="3" fill="#22C55E" stroke="#15803D" stroke-width="2"/>
  <text x="32" y="38" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="sans-serif">1</text>
  <!-- Crown on 1st -->
  <polygon points="32,10 29,17 32,15 35,17" fill="#F59E0B"/>
  <!-- 3rd place bar -->
  <rect x="37" y="38" width="14" height="12" rx="3" fill="#BBF7D0" stroke="#22C55E" stroke-width="2"/>
  <text x="44" y="47" text-anchor="middle" font-size="9" font-weight="700" fill="#15803D" font-family="sans-serif">3</text>
</svg>
