<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Top speech bubble -->
  <rect x="8" y="8" width="34" height="24" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Top bubble tail -->
  <path d="M16 32 L10 42 L24 32" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Bottom speech bubble -->
  <rect x="22" y="34" width="34" height="22" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <!-- Bottom bubble tail -->
  <path d="M48 34 L54 26 L40 34" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Dots in bubbles -->
  <circle cx="20" cy="20" r="2" fill="#3B82F6"/>
  <circle cx="27" cy="20" r="2" fill="#3B82F6"/>
  <circle cx="34" cy="20" r="2" fill="#3B82F6"/>
</svg>
