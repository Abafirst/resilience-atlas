  <!-- Wave 3 (outer, subtle) -->
  <path d="M8 48 C15 36 22 54 32 44 C42 34 49 50 56 40" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- Heart dot at center top -->
  <path d="M32 20 C32 20 26 14 26 19 C26 24 32 28 32 28 C32 28 38 24 38 19 C38 14 32 20 32 20Z" fill="#8B5CF6"/>
</svg>
