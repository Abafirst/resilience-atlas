<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="#F3EEFF"/>
  <!-- Three flowing waves suggesting emotional adaptation -->
  <!-- Wave 1 (inner, most prominent) -->
