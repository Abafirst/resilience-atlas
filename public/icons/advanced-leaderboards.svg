<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Chart background -->
  <rect x="8" y="8" width="48" height="48" rx="6" fill="#EDE9FE" stroke="#6D28D9" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="16" y1="44" x2="52" y2="44" stroke="#6D28D9" stroke-width="0.75" opacity="0.3"/>
  <line x1="16" y1="36" x2="52" y2="36" stroke="#6D28D9" stroke-width="0.75" opacity="0.3"/>
  <line x1="16" y1="28" x2="52" y2="28" stroke="#6D28D9" stroke-width="0.75" opacity="0.3"/>
  <!-- Bar 1 -->
  <rect x="17" y="34" width="7" height="10" rx="2" fill="#7C3AED"/>
  <!-- Bar 2 -->
  <rect x="27" y="26" width="7" height="18" rx="2" fill="#6D28D9"/>
  <!-- Bar 3 -->
  <rect x="37" y="30" width="7" height="14" rx="2" fill="#7C3AED"/>
  <!-- Trend line -->
  <polyline points="20,30 30,22 40,25 50,18" stroke="#A855F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend dots -->
  <circle cx="20" cy="30" r="2" fill="#A855F7"/>
  <circle cx="30" cy="22" r="2" fill="#A855F7"/>
  <circle cx="40" cy="25" r="2" fill="#A855F7"/>
  <circle cx="50" cy="18" r="2.5" fill="#A855F7"/>
</svg>
