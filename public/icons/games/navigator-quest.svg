<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Outer compass ring -->
  <circle cx="32" cy="32" r="27" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Inner tick ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#93C5FD" stroke-width="1" stroke-dasharray="2 4"/>
  <!-- North needle (blue) -->
  <polygon points="32,8  28,32 32,29 36,32" fill="#3B82F6"/>
  <!-- South needle (light blue) -->
  <polygon points="32,56 28,32 32,35 36,32" fill="#93C5FD"/>
  <!-- Quest flag on top -->
  <line x1="32" y1="5" x2="32" y2="18" stroke="#1D4ED8" stroke-width="2"/>
  <polygon points="32,5 42,9 32,13" fill="#F59E0B"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#1D4ED8"/>
</svg>
