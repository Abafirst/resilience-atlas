<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Map background -->
  <rect x="8" y="10" width="48" height="44" rx="4" fill="#F0FDF4" stroke="#15803D" stroke-width="2.5"/>
  <!-- Map fold lines (parchment look) -->
  <line x1="24" y1="10" x2="24" y2="54" stroke="#15803D" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="40" y1="10" x2="40" y2="54" stroke="#15803D" stroke-width="1.5" stroke-dasharray="3 3"/>
  <!-- Waving top/bottom edges to hint it's a scroll -->
  <path d="M8 18 Q16 14 24 18 Q32 22 40 18 Q48 14 56 18" stroke="#15803D" stroke-width="1.5" fill="none"/>
  <!-- Location pin -->
  <circle cx="32" cy="30" r="7" fill="#15803D"/>
  <circle cx="32" cy="29" r="3" fill="#F0FDF4"/>
  <line x1="32" y1="37" x2="32" y2="43" stroke="#15803D" stroke-width="2" stroke-linecap="round"/>
  <!-- Stars on map -->
  <circle cx="18" cy="38" r="2" fill="#FCD34D"/>
  <circle cx="46" cy="24" r="2" fill="#FCD34D"/>
</svg>
