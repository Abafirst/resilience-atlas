<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Cardinal tick marks -->
  <line x1="32" y1="6"  x2="32" y2="12" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="58" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="12" y2="32" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="32" x2="58" y2="32" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- North needle (blue, pointing up) -->
  <polygon points="32,10 28,32 32,29 36,32" fill="#3B82F6"/>
  <!-- South needle (slate, pointing down) -->
  <polygon points="32,54 28,32 32,35 36,32" fill="#93C5FD"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="#1D4ED8"/>
  <!-- Letter N -->
  <text x="29" y="20" font-size="8" fill="#1D4ED8" font-family="sans-serif" font-weight="bold">N</text>
</svg>
