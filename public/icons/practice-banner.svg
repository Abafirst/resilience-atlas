<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#EDE9FE"/>
  <!-- Outer compass ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <!-- Dashed inner ring -->
  <circle cx="32" cy="32" r="15" fill="none" stroke="#7C3AED" stroke-width="1" stroke-dasharray="2 4"/>
  <!-- North needle (purple, pointing up) -->
  <polygon points="32,12 29,32 32,30 35,32" fill="#7C3AED"/>
  <!-- South needle (lighter, pointing down) -->
  <polygon points="32,52 29,32 32,34 35,32" fill="#C4B5FD"/>
  <!-- East/West axis lines -->
  <line x1="10" y1="32" x2="17" y2="32" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="32" x2="54" y2="32" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#7C3AED"/>
</svg>
