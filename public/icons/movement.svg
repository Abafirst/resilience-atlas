<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="28" fill="#EFF6FF"/>
  <!-- Walking person: head -->
  <circle cx="36" cy="12" r="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <!-- Body / torso -->
  <path d="M36 18 L34 34" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arm swinging forward -->
  <path d="M34 22 L24 30" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arm swinging back -->
  <path d="M34 26 L42 32" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Left leg (forward) -->
  <path d="M34 34 L28 46 L24 54" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right leg (back) -->
  <path d="M34 34 L40 46 L44 52" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ground line -->
  <line x1="14" y1="56" x2="50" y2="56" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
</svg>
