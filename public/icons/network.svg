<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <!-- Globe circle -->
  <circle cx="32" cy="32" r="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Vertical meridian -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal equator -->
  <line x1="8" y1="32" x2="56" y2="32" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left longitude curve -->
  <path d="M32 8 C22 18 22 46 32 56" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Right longitude curve -->
  <path d="M32 8 C42 18 42 46 32 56" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#3B82F6"/>
</svg>
