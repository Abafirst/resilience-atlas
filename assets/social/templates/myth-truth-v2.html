<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Myth → Truth v2 — The Resilience Atlas</title>
  <style>
    
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    background: #FAF7F2;
    color: #0F2436;
    font-family: 'Inter', Arial, Helvetica, sans-serif;
  }
  .card {
    position: relative;
    width: 1080px; height: 1080px;
    background: #FAF7F2;
    padding: 80px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .motif {
    position: absolute;
    pointer-events: none;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 10px 24px;
    border-radius: 100px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 36px;
    align-self: flex-start;
  }
  .headline {
    font-family: 'DM Serif Display', Georgia, 'Times New Roman', serif;
    font-size: 58px;
    line-height: 1.18;
    color: #0F2436;
    margin-bottom: 40px;
    flex-shrink: 0;
  }
  .body-text {
    font-size: 28px;
    line-height: 1.6;
    color: #0F2436;
    flex: 1;
  }
  .bullets { list-style: none; padding: 0; }
  .bullets li {
    padding-left: 28px;
    position: relative;
    margin-bottom: 18px;
    font-size: 28px;
    line-height: 1.5;
  }
  .bullets li::before {
    content: '•';
    position: absolute;
    left: 0;
    font-size: 28px;
  }
  .footer-rule {
    width: 100%;
    height: 1px;
    background: rgba(15,36,54,0.12);
    margin-bottom: 20px;
    flex-shrink: 0;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    color: #0F2436;
    flex-shrink: 0;
  }
  .footer span:last-child { opacity: 0.72; }

    .split-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
      margin-bottom: 32px;
    }
    .block {
      flex: 1;
      border-radius: 18px;
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .block-myth {
      background: #E9C46A22;
      border: 1.5px solid #E9C46A55;
    }
    .block-truth {
      background: #E9C46A;
    }
    .block-label {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0.65;
    }
    .block-myth .block-label { color: #0F2436; }
    .block-truth .block-label { color: #0F2436; }
    .block-myth .block-text { color: #0F2436; font-size: 30px; line-height: 1.4; }
    .block-truth .block-text { color: #0F2436; font-size: 30px; line-height: 1.4; font-family: 'DM Serif Display', Georgia, serif; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="motif" aria-hidden="true"
    style="right:-40px;top:80px;width:520px;height:520px;opacity:0.07;"
    viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <path d="M 150 150 m -120 0 a 120 60 0 1 0 240 0 a 120 60 0 1 0 -240 0" fill="none" stroke="#E9C46A" stroke-width="1.2"/>
    <path d="M 150 150 m -95 0 a 95 48 0 1 0 190 0 a 95 48 0 1 0 -190 0" fill="none" stroke="#E9C46A" stroke-width="1"/>
    <path d="M 150 150 m -70 0 a 70 35 0 1 0 140 0 a 70 35 0 1 0 -140 0" fill="none" stroke="#E9C46A" stroke-width="0.9"/>
    <path d="M 150 150 m -48 0 a 48 24 0 1 0 96 0 a 48 24 0 1 0 -96 0" fill="none" stroke="#E9C46A" stroke-width="0.8"/>
    <path d="M 150 150 m -28 0 a 28 14 0 1 0 56 0 a 28 14 0 1 0 -56 0" fill="none" stroke="#E9C46A" stroke-width="0.7"/>
  </svg>

    <div style="margin-bottom:32px;">
      <span class="pill" style="background:#E9C46A;color:#0F2436;display:inline-flex;align-items:center;padding:10px 24px;border-radius:100px;font-size:20px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;">Myth / Truth</span>
    </div>

    <div class="split-container">
      <div class="block block-myth">
        <div class="block-label">Myth</div>
        <p class="block-text">Resilience means powering through on your own.</p>
      </div>
      <div class="block block-truth">
        <div class="block-label">Truth</div>
        <p class="block-text">Resilience is built in connection, not in isolation.</p>
      </div>
    </div>

    
    <div class="footer-rule"></div>
    <footer class="footer">
      <span>The Resilience Atlas&#x2122;</span>
      <span>theresilienceatlas.com</span>
    </footer>
  </div>
</body>
</html>
