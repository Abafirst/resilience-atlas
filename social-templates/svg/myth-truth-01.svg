<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080"
     role="img" aria-labelledby="mt1-title">
  <title id="mt1-title">The Resilience Atlas&#8482; &#8212; Myth / Truth Template (Variant 1)</title>

  <!-- Myth half -->
  <rect x="0" y="0"   width="1080" height="492" fill="#E9C46A"/>
  <!-- Truth half (extends to footer start) -->
  <rect x="0" y="492" width="1080" height="460" fill="#2A9D8F"/>

  <!-- Compass decoration -->
  <g opacity="0.10">
    <circle cx="950" cy="492" r="140"  fill="none" stroke="#0F2436" stroke-width="1.5" stroke-dasharray="7,5"/>
    <circle cx="950" cy="492" r="77" fill="none" stroke="#0F2436" stroke-width="0.75" stroke-dasharray="3,5"/>
    <line x1="950"   y1="352" x2="950"   y2="632" stroke="#0F2436" stroke-width="0.75"/>
    <line x1="810" y1="492"   x2="1090" y2="492"   stroke="#0F2436" stroke-width="0.75"/>
    <line x1="852" y1="394" x2="1048" y2="590" stroke="#0F2436" stroke-width="0.5"/>
    <line x1="1048" y1="394" x2="852" y2="590" stroke="#0F2436" stroke-width="0.5"/>
    <line x1="950"   y1="352"   x2="950"   y2="363"   stroke="#0F2436" stroke-width="3"/>
    <line x1="950"   y1="621" x2="950"   y2="632"     stroke="#0F2436" stroke-width="3"/>
    <line x1="810" y1="492"     x2="821" y2="492"     stroke="#0F2436" stroke-width="3"/>
    <line x1="1079" y1="492"   x2="1090" y2="492"       stroke="#0F2436" stroke-width="3"/>
    <circle cx="950" cy="492" r="5" fill="#0F2436"/>
  </g>

  <!-- Divider line -->
  <line x1="0" y1="492" x2="1080" y2="492" stroke="#0F2436" stroke-width="3"/>

  <!-- ── MYTH section ── -->
  <text x="80" y="88" fill="#0F2436" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="5" opacity="0.55">MYTH</text>
  <line x1="80" y1="101" x2="148" y2="101" stroke="#0F2436" stroke-width="1.5" opacity="0.35"/>

  <text x="80" y="210" fill="#0F2436" font-family="'DM Serif Display', Georgia, 'Times New Roman', serif" font-size="66">&#8220;Resilient people</text>
  <text x="80" y="288" fill="#0F2436" font-family="'DM Serif Display', Georgia, 'Times New Roman', serif" font-size="66">don&#8217;t struggle.&#8221;</text>

  <!-- Myth / Truth badge top-right -->
  <text x="1000" y="52" text-anchor="end" fill="#0F2436" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="1" opacity="0.45">Myth / Truth</text>

  <!-- ── TRUTH section ── -->
  <text x="80" y="578" fill="#FFFFFF" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="5" opacity="0.55">TRUTH</text>
  <line x1="80" y1="591" x2="162" y2="591" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35"/>

  <text x="80" y="692" fill="#FFFFFF" font-family="'DM Serif Display', Georgia, 'Times New Roman', serif" font-size="60">Resilience is how you</text>
  <text x="80" y="764" fill="#FFFFFF" font-family="'DM Serif Display', Georgia, 'Times New Roman', serif" font-size="60">move through struggle.</text>

  <!-- Atlas coordinate tag -->
  <text x="80" y="872" fill="#FFFFFF" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="16" letter-spacing="2.5" opacity="0.20">RESILIENCE ATLAS</text>
  <line x1="80" y1="886" x2="280" y2="886" stroke="#FFFFFF" stroke-width="0.75" opacity="0.15"/>

  <!-- Footer -->
  <rect x="0" y="952" width="1080" height="128" fill="#091A28"/>
  <line x1="0" y1="952" x2="1080" y2="952" stroke="#0F2436" stroke-width="2.5"/>
  <text x="80"   y="1030" fill="#FAF7F2" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="0.4">The Resilience Atlas&#8482;</text>
  <text x="1000" y="1030" text-anchor="end" fill="#FAF7F2" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="22" opacity="0.75">theresilienceatlas.com</text>
</svg>
