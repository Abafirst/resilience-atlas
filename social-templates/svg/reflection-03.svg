<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080"
     role="img" aria-labelledby="ref3-title">
  <title id="ref3-title">The Resilience Atlas&#8482; &#8212; Weekly Reflection Template (Variant 3)</title>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#FAF7F2"/>

  <!-- Faint coordinate grid -->
  <g opacity="0.045" stroke="#0F2436" stroke-width="0.75">
    <line x1="0"   y1="270" x2="1080" y2="270"/>
    <line x1="0"   y1="540" x2="1080" y2="540"/>
    <line x1="0"   y1="810" x2="1080" y2="810"/>
    <line x1="270" y1="0"   x2="270" y2="952"/>
    <line x1="540" y1="0"   x2="540" y2="952"/>
    <line x1="810" y1="0"   x2="810" y2="952"/>
  </g>

  <!-- Compass decoration -->
  <g opacity="0.07">
    <circle cx="950" cy="750" r="175"  fill="none" stroke="#0F2436" stroke-width="1.5" stroke-dasharray="7,5"/>
    <circle cx="950" cy="750" r="96" fill="none" stroke="#0F2436" stroke-width="0.75" stroke-dasharray="3,5"/>
    <line x1="950"   y1="575" x2="950"   y2="925" stroke="#0F2436" stroke-width="0.75"/>
    <line x1="775" y1="750"   x2="1125" y2="750"   stroke="#0F2436" stroke-width="0.75"/>
    <line x1="827" y1="627" x2="1073" y2="873" stroke="#0F2436" stroke-width="0.5"/>
    <line x1="1073" y1="627" x2="827" y2="873" stroke="#0F2436" stroke-width="0.5"/>
    <line x1="950"   y1="575"   x2="950"   y2="589"   stroke="#0F2436" stroke-width="3"/>
    <line x1="950"   y1="911" x2="950"   y2="925"     stroke="#0F2436" stroke-width="3"/>
    <line x1="775" y1="750"     x2="789" y2="750"     stroke="#0F2436" stroke-width="3"/>
    <line x1="1111" y1="750"   x2="1125" y2="750"       stroke="#0F2436" stroke-width="3"/>
    <circle cx="950" cy="750" r="5" fill="#0F2436"/>
  </g>

  <!-- Large faint "?" (depth element) -->
  <text x="820" y="640" text-anchor="middle" fill="#0F2436" font-family="'DM Serif Display', Georgia, 'Times New Roman', serif"
        font-size="520" opacity="0.025">?</text>

  <!-- Top accent strip -->
  <rect x="0" y="0" width="1080" height="8" fill="#E76F51"/>
  <!-- Left accent rule -->
  <rect x="0" y="8" width="5" height="944" fill="#E76F51" opacity="0.28"/>

  <!-- Section label -->
  <text x="80" y="108" fill="#E76F51" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3.5">WEEKLY REFLECTION</text>
  <line x1="80" y1="122" x2="418" y2="122" stroke="#E76F51" stroke-width="1.2" opacity="0.45"/>

  <!-- Main question -->
  <text x="80" y="258" fill="#0F2436" font-family="'DM Serif Display', Georgia, 'Times New Roman', serif" font-size="68">Where are you being</text>
  <text x="80" y="342" fill="#0F2436" font-family="'DM Serif Display', Georgia, 'Times New Roman', serif" font-size="68">hardest on yourself</text>
  <text x="80" y="426" fill="#0F2436" font-family="'DM Serif Display', Georgia, 'Times New Roman', serif" font-size="68">right now?</text>

  <!-- Accent divider -->
  <line x1="80" y1="476" x2="420" y2="476" stroke="#E76F51" stroke-width="2.5"/>

  <!-- Prompt line -->
  <text x="80" y="538" fill="#0F2436" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="26" font-style="italic" opacity="0.60">Pause. Breathe. Answer honestly.</text>

  <!-- Optional prompts -->
  <text x="80" y="630" fill="#0F2436" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="26" opacity="0.68">&#8226; What would you say to a friend in this moment?</text>
  <text x="80" y="678" fill="#0F2436" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="26" opacity="0.68">&#8226; What would &#8220;supportive honesty&#8221; sound like?</text>

  <!-- Atlas coordinate tag -->
  <text x="80" y="862" fill="#0F2436" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="16" letter-spacing="2.5" opacity="0.20">RESILIENCE COORDINATES</text>
  <line x1="80" y1="876" x2="360" y2="876" stroke="#0F2436" stroke-width="0.75" opacity="0.14"/>

  <!-- Footer -->
  <rect x="0" y="952" width="1080" height="128" fill="#091A28"/>
  <line x1="0" y1="952" x2="1080" y2="952" stroke="#E76F51" stroke-width="2.5"/>
  <text x="80"   y="1030" fill="#FAF7F2" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="0.4">The Resilience Atlas&#8482;</text>
  <text x="1000" y="1030" text-anchor="end" fill="#FAF7F2" font-family="'Inter', 'Source Sans 3', Arial, sans-serif" font-size="22" opacity="0.75">theresilienceatlas.com</text>
</svg>
