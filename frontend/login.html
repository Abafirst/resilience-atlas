<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Resilience Atlas&#8482; — Sign In</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a3a5c 0%, #2c7da0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            text-align: center;
        }

        .logo h1 {
            color: #1a3a5c;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 13px;
            background: #2c7da0;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn:hover { background: #1a5f82; }

        .note {
            margin-top: 20px;
            color: #6c757d;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>&#127757; The Resilience Atlas&#8482;</h1>
            <p>Discover your resilience profile</p>
        </div>
        <a href="/" class="btn">Sign In / Create Account</a>
        <p class="note">Authentication is handled securely via Auth0.</p>
    </div>
</body>
</html>
